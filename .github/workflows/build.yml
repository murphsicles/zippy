name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: zippy-linux-x64
            ext: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: zippy-macos-x64
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: zippy-macos-arm64
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: zippy-windows-x64
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          if command -v strip &>/dev/null; then
            strip target/${{ matrix.target }}/release/zippy
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: target/${{ matrix.target }}/release/zippy${{ matrix.ext }}

  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Build .deb
        run: |
          cp artifacts/zippy-linux-x64/zippy packaging/deb/usr/local/bin/zippy
          chmod 755 packaging/deb/usr/local/bin/zippy
          chmod 755 packaging/deb/DEBIAN/postinst
          dpkg-deb --build packaging/deb zippy_${{ github.ref_name }}_amd64.deb

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: false
          files: |
            artifacts/zippy-linux-x64/*
            artifacts/zippy-macos-x64/*
            artifacts/zippy-macos-arm64/*
            artifacts/zippy-windows-x64/*
            zippy_${{ github.ref_name }}_amd64.deb
          generate_release_notes: true
